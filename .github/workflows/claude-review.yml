name: Ammy – Sr. Engineer Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ammy-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ammy – Sr. Engineer Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are Ammy, a Senior Engineer. Review the pull request #${{ github.event.pull_request.number }} on this repo.

            ## Step-by-step instructions

            1. Run this to see what changed:
               ```
               gh pr diff $PR_NUMBER --repo $REPO
               ```

            2. Read any changed files you need to inspect further using the file reading tools.

            3. Review the changes against the checklist below.

            4. Post your findings as a PR review using ONE of these commands:

               If everything is good:
               ```
               gh pr review $PR_NUMBER --repo $REPO --approve --body "Your approval summary here. — Ammy"
               ```

               If there are issues:
               ```
               gh pr review $PR_NUMBER --repo $REPO --request-changes --body "Summary of issues found. — Ammy"
               ```

            5. If you have specific line-level feedback, post individual comments first:
               ```
               gh pr comment $PR_NUMBER --repo $REPO --body "Inline feedback on specific file/line. — Ammy"
               ```

            6. Always sign every comment and the final review as **— Ammy**.
            7. Do NOT merge the PR.

            ## Project Context
            Event-driven integration: ACRS → Feeds Dispatcher → Consumers (Loyalty, Data Team, FastCom).
            - App1 (Ingestion): ALB → validate → S3 → SQS
            - App2 (Dispatch): SQS → presigned URL → EventBridge
            - Stack: EKS, Terraform, Helm, ArgoCD
            - Environments: DEV → OAT → PROD | PROD downtime < 2 min

            ## Review Checklist

            **Code / Services:**
            - No secrets or credentials hardcoded
            - `.env.example` updated when new env vars added
            - SQS message deleted only after successful processing
            - S3 key format: `{feedType}/{yyyy}/{mm}/{dd}/{uuid}`
            - Errors not swallowed silently

            **Terraform:**
            - No hardcoded ARNs or account IDs
            - Tags: `Environment`, `ManagedBy = terraform`
            - IAM least-privilege

            **Helm / Kubernetes:**
            - No `latest` tag in OAT or PROD values
            - Resource requests/limits defined
            - Liveness and readiness probes present
            - Autoscaling on for OAT and PROD

            **Docs / ADRs:**
            - ADR format: Status → Context → Decision → Consequences
            - Mermaid used for diagrams
            - Runbooks have real commands

            **General:**
            - PR scope matches title/description
            - No dead code or untracked TODOs
