replicaCount: 2

image:
  repository: ""  # Set per environment — ECR URI
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health/details
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 15

env:
  PORT: "8080"
  NODE_ENV: "production"
  SQS_MAX_MESSAGES: "10"
  SQS_WAIT_TIME_SECONDS: "20"
  SQS_VISIBILITY_TIMEOUT: "300"
  S3_PRESIGNED_URL_TTL_SECONDS: "86400"

envFromSecrets:
  - name: app2-dispatch-secrets

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
