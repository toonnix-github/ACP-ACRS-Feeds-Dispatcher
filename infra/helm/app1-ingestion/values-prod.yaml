replicaCount: 3

image:
  repository: "{account}.dkr.ecr.eu-west-1.amazonaws.com/feeds-dispatcher/app1-ingestion"
  tag: ""  # Set by CI pipeline — never use "latest" in PROD

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

env:
  NODE_ENV: "production"
  AWS_REGION: "eu-west-1"
  S3_BUCKET_NAME: "feeds-dispatcher-raw-prod"
  SQS_QUEUE_URL: "https://sqs.eu-west-1.amazonaws.com/{account}/feeds-dispatcher-sqs-prod"
