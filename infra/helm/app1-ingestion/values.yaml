replicaCount: 2

image:
  repository: ""  # Set per environment — ECR URI
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health/details
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 15

env:
  PORT: "8080"
  NODE_ENV: "production"
  AUTH_ENABLED: "true"

envFromSecrets:
  - name: app1-ingestion-secrets  # AWS Secrets Manager via External Secrets Operator

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
