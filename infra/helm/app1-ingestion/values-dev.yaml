replicaCount: 1

image:
  repository: "{account}.dkr.ecr.eu-west-1.amazonaws.com/feeds-dispatcher/app1-ingestion"
  tag: "latest"

env:
  NODE_ENV: "development"
  AWS_REGION: "eu-west-1"
  S3_BUCKET_NAME: "feeds-dispatcher-raw-dev"
  SQS_QUEUE_URL: "https://sqs.eu-west-1.amazonaws.com/{account}/feeds-dispatcher-sqs-dev"

autoscaling:
  enabled: false
